<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С днем рождения!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            background: linear-gradient(135deg, #1a0000, #0a0000);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        body {
            margin: 0;
            padding: 10px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 620px;
            margin: 0 auto;
            position: relative;
        }
        
        canvas {
            display: none;
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            position: relative;
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            max-width: 600px;
            max-height: 600px;
            touch-action: none;
        }
        
        canvas.active {
            display: block;
        }
        
        /* Кнопка-тортик */
        #cakeButton {
            position: relative;
            width: 180px;
            height: 180px;
            cursor: pointer;
            transition: transform 0.3s ease;
            background: none;
            border: none;
            padding: 0;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        
        #cakeButton:hover {
            transform: scale(1.1) rotate(-3deg);
        }
        
        #cakeButton:active {
            transform: scale(0.95);
        }
        
        .cake-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(255, 200, 100, 0.3));
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            25% { opacity: 0.7; }
            50% { opacity: 1; }
            75% { opacity: 0.8; }
        }
        
        .flame {
            animation: flicker 0.5s ease-in-out infinite;
        }
        .flame2 {
            animation: flicker 0.7s ease-in-out infinite;
            animation-delay: 0.2s;
        }
        .flame3 {
            animation: flicker 0.6s ease-in-out infinite;
            animation-delay: 0.4s;
        }
        
        /* Конфетти */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1000;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: confettiFall linear forwards;
        }
        
        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        .title {
            color: #ff0000;
            font-size: clamp(24px, 7vw, 52px);
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            display: none;
            animation: glow 2s ease-in-out infinite;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            text-align: center;
            padding: 0 10px;
            width: 100%;
        }
        
        .title.active {
            display: block;
        }
        
        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 60px rgba(255, 0, 0, 0.9), 0 0 100px rgba(255, 0, 0, 0.4);
                transform: scale(1.05);
            }
        }
        
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }
        
        .cake-label {
            color: #ffcc88;
            font-size: clamp(14px, 3vw, 18px);
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.3);
            opacity: 0.8;
            letter-spacing: 2px;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        /* Контейнер для текста поверх canvas */
        .text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            font-family: 'Georgia', serif;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
            z-index: 10;
            width: 85%;
            max-width: 500px;
            padding: 10px;
        }

        .text-overlay.visible {
            opacity: 1;
        }

        .text-overlay .main-text {
            font-size: clamp(14px, 3.5vw, 28px);
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 200, 200, 0.5), 0 0 60px rgba(255, 100, 100, 0.3);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .text-overlay .sub-text {
            font-size: clamp(12px, 2.5vw, 20px);
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 40px rgba(255, 215, 0, 0.8); }
        }

        /* Контейнер для canvas с позиционированием */
        .canvas-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 600px;
            max-height: 600px;
            aspect-ratio: 1/1;
        }

        .fade-out {
            animation: fadeOut 1.5s ease forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.9);
            }
        }

        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 480px) {
            #cakeButton {
                width: 140px;
                height: 140px;
            }
            
            .container {
                gap: 15px;
                padding: 5px;
            }
            
            .text-overlay .main-text {
                font-size: clamp(12px, 3vw, 16px);
                line-height: 1.4;
            }
            
            canvas {
                border-width: 1px;
            }
            
            .text-overlay {
                width: 90%;
            }
        }

        @media (max-width: 360px) {
            #cakeButton {
                width: 110px;
                height: 110px;
            }
            
            .text-overlay .main-text {
                font-size: 11px;
            }
            
            .text-overlay .sub-text {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="button-container" id="buttonContainer">
            <div class="title" id="title">❤️ С днем рождения! ❤️</div>
            <button id="cakeButton">
                <svg class="cake-svg" viewBox="0 0 200 200">
                    <rect x="30" y="110" width="140" height="50" rx="5" fill="#d4a574" stroke="#b8895e" stroke-width="2"/>
                    <rect x="25" y="100" width="150" height="15" rx="3" fill="#fff5e6" stroke="#f0dcc8" stroke-width="1"/>
                    <rect x="35" y="85" width="130" height="20" rx="3" fill="#e8c9a0" stroke="#d4a574" stroke-width="1"/>
                    <rect x="30" y="78" width="140" height="12" rx="3" fill="#fff5e6" stroke="#f0dcc8" stroke-width="1"/>
                    
                    <circle cx="60" cy="92" r="6" fill="#ff6b6b"/>
                    <circle cx="100" cy="92" r="6" fill="#ffd93d"/>
                    <circle cx="140" cy="92" r="6" fill="#6bcb77"/>
                    <circle cx="80" cy="88" r="4" fill="#ff6b6b"/>
                    <circle cx="120" cy="88" r="4" fill="#ffd93d"/>
                    
                    <rect x="70" y="55" width="8" height="25" rx="2" fill="#ff6b6b"/>
                    <rect x="72" y="52" width="4" height="5" rx="1" fill="#ff4757"/>
                    <ellipse class="flame" cx="74" cy="48" rx="4" ry="8" fill="#ffd93d"/>
                    <ellipse class="flame" cx="74" cy="46" rx="2" ry="5" fill="#fff5e6"/>
                    
                    <rect x="96" y="55" width="8" height="25" rx="2" fill="#4ecdc4"/>
                    <rect x="98" y="52" width="4" height="5" rx="1" fill="#45b7aa"/>
                    <ellipse class="flame2" cx="100" cy="48" rx="4" ry="8" fill="#ffd93d"/>
                    <ellipse class="flame2" cx="100" cy="46" rx="2" ry="5" fill="#fff5e6"/>
                    
                    <rect x="122" y="55" width="8" height="25" rx="2" fill="#ffd93d"/>
                    <rect x="124" y="52" width="4" height="5" rx="1" fill="#f5c842"/>
                    <ellipse class="flame3" cx="126" cy="48" rx="4" ry="8" fill="#ffd93d"/>
                    <ellipse class="flame3" cx="126" cy="46" rx="2" ry="5" fill="#fff5e6"/>
                    
                    <circle cx="80" cy="115" r="3" fill="#333"/>
                    <circle cx="120" cy="115" r="3" fill="#333"/>
                    <path d="M 85 122 Q 100 130 115 122" stroke="#333" stroke-width="2" fill="none"/>
                    
                    <ellipse cx="100" cy="165" rx="80" ry="10" fill="rgba(0,0,0,0.2)"/>
                </svg>
            </button>
            <div class="cake-label">🎂 Нажми на тортик! 🎂</div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="heartCanvas" width="600" height="600"></canvas>
            <div class="text-overlay" id="textOverlay">
                <div class="main-text">
                    💖 Счастья, здоровья<br>
                    и еще спасибо,<br>
                    что появилась в моей жизни,<br>
                    я тебя очень ценю и дорожу 💖
                </div>
                <div class="sub-text">✨ С любовью навсегда ✨</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const cakeButton = document.getElementById('cakeButton');
        const title = document.getElementById('title');
        const cakeLabel = document.querySelector('.cake-label');
        const textOverlay = document.getElementById('textOverlay');

        // Размеры canvas (всегда 600x600 для логики)
        const CANVAS_SIZE = 600;
        const centerX = CANVAS_SIZE / 2;
        const centerY = CANVAS_SIZE / 2;
        const scale = 15;

        let animationStarted = false;
        let animationId = null;
        let isPulsing = false;
        let pulseTime = 0;
        let fadeStarted = false;
        let fadeProgress = 0;
        let textShown = false;

        // Функция сердца
        function corazon(n) {
            const x = 16 * Math.pow(Math.sin(n), 3);
            const y = 13 * Math.cos(n) - 5 * Math.cos(2 * n) - 2 * Math.cos(3 * n) - Math.cos(4 * n);
            return { x, y };
        }

        // Получаем все точки сердца
        function getHeartPoints() {
            const points = [];
            for (let n = 0; n <= 100; n += 2) {
                const angle = n / 10;
                const pos = corazon(angle);
                points.push(pos);
            }
            return points;
        }

        // Создание конфетти
        function createConfetti() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);
            
            const colors = ['#ff0000', '#ff6b6b', '#ffd93d', '#6bcb77', '#4ecdc4', '#ff6b6b', '#ffd93d', '#ff4757', '#ff6348', '#ff9ff3'];
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.width = (Math.random() * 8 + 4) + 'px';
                confetti.style.height = (Math.random() * 8 + 4) + 'px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                confetti.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(confetti);
            }
            
            setTimeout(() => {
                container.remove();
            }, 4000);
        }

        // Рисуем сердце с прогрессом и пульсацией
        function drawHeart(progress, pulseScale = 1, fadeAmount = 0) {
            // Очищаем canvas
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Градиентный фон
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 300);
            gradient.addColorStop(0, 'rgba(20, 0, 0, 1)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            const allPoints = getHeartPoints();
            const totalPoints = allPoints.length;
            const pointsToDraw = Math.floor(progress * totalPoints);

            // Вычисляем цвет с учётом затухания
            const redBase = 255;
            const greenBase = Math.floor(150 + 105 * (1 - Math.abs(pulseScale - 1) * 2));
            
            const fadeFactor = 1 - fadeAmount * 0.6;
            const red = Math.floor(redBase * (0.4 + 0.6 * fadeFactor));
            const green = Math.floor(greenBase * (0.3 + 0.7 * fadeFactor));
            const blue = Math.floor(greenBase * (0.3 + 0.7 * fadeFactor));

            const color = `rgb(${red}, ${green}, ${blue})`;

            // Рисуем 15 вложенных сердец
            for (let i = 1; i <= 15; i++) {
                const currentScale = scale * i / 15 * pulseScale;

                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                
                let firstPoint = true;

                for (let j = 0; j < pointsToDraw; j++) {
                    const pos = allPoints[j];
                    
                    const x = centerX + pos.x * currentScale;
                    const y = centerY - pos.y * currentScale;

                    if (firstPoint) {
                        ctx.moveTo(x, y);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.stroke();
            }

            // Светящаяся точка в конце линии
            if (progress < 1 && pointsToDraw > 0) {
                const smoothPos = allPoints[pointsToDraw - 1];
                
                for (let i = 1; i <= 15; i++) {
                    const currentScale = scale * i / 15 * pulseScale;
                    const x = centerX + smoothPos.x * currentScale;
                    const y = centerY - smoothPos.y * currentScale;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff4444';
                    ctx.fill();
                }
            }

            // Свечение
            if (progress >= 1) {
                const glowGradient = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, 250);
                const glowIntensity = 0.05 * (1 + Math.abs(pulseScale - 1) * 2) * (1 - fadeAmount * 0.5);
                glowGradient.addColorStop(0, `rgba(255, 0, 0, ${glowIntensity})`);
                glowGradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
                ctx.fillStyle = glowGradient;
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            }
        }

        // Сброс анимации
        function resetAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            canvas.classList.remove('active');
            canvas.style.display = 'none';
            title.classList.remove('active');
            textOverlay.classList.remove('visible');
            
            cakeButton.style.display = 'block';
            cakeLabel.style.display = 'block';
            
            animationStarted = false;
            isPulsing = false;
            pulseTime = 0;
            fadeStarted = false;
            fadeProgress = 0;
            textShown = false;
            
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        }

        // Анимация
        let startTime = null;
        const duration = 4000;
        const pauseDuration = 500;
        const fadeStartTime = 15000;

        function animate(time) {
            if (startTime === null) {
                startTime = time;
            }

            const elapsed = time - startTime;
            
            if (elapsed > fadeStartTime && !fadeStarted) {
                fadeStarted = true;
                fadeProgress = 0;
            }

            if (fadeStarted && fadeProgress < 1) {
                fadeProgress += 0.003;
                if (fadeProgress > 1) fadeProgress = 1;
            }

            if (fadeStarted && !textShown && fadeProgress > 0.1) {
                textShown = true;
                textOverlay.classList.add('visible');
            }

            if (!isPulsing) {
                const drawTime = elapsed;
                
                if (drawTime < duration) {
                    let progress = drawTime / duration;
                    progress = progress < 0.5 ? 
                        2 * progress * progress : 
                        1 - Math.pow(-2 * progress + 2, 2) / 2;
                    drawHeart(progress, 1, 0);
                } else if (drawTime < duration + pauseDuration) {
                    drawHeart(1, 1, fadeProgress);
                } else {
                    isPulsing = true;
                    pulseTime = 0;
                }
            } else {
                pulseTime += 0.02;
                const pulseScale = 1 + 0.15 * Math.sin(pulseTime * 3);
                drawHeart(1, pulseScale, fadeProgress);
                
                if (fadeProgress < 1) {
                    const glowIntensity = (0.1 + 0.15 * Math.sin(pulseTime * 3)) * (1 - fadeProgress * 0.5);
                    const gradient = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, 300);
                    gradient.addColorStop(0, `rgba(255, 0, 0, ${glowIntensity * 0.3})`);
                    gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                }
            }

            animationId = requestAnimationFrame(animate);
        }

        // Запуск анимации
        function startAnimation() {
            if (animationStarted) {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                startTime = null;
                isPulsing = false;
                pulseTime = 0;
                fadeStarted = false;
                fadeProgress = 0;
                textShown = false;
                textOverlay.classList.remove('visible');
            }

            canvas.style.display = 'block';
            canvas.classList.add('active');
            title.classList.add('active');
            
            cakeButton.style.display = 'none';
            cakeLabel.style.display = 'none';
            
            createConfetti();
            
            animationStarted = true;
            startTime = null;
            isPulsing = false;
            pulseTime = 0;
            fadeStarted = false;
            fadeProgress = 0;
            textShown = false;
            
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            animationId = requestAnimationFrame(animate);
        }

        cakeButton.addEventListener('click', startAnimation);
        cakeButton.addEventListener('touchstart', function(e) {
            e.preventDefault();
            startAnimation();
        });
    </script>
</body>
</html>
